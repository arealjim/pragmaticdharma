name = "pragmaticdharma"
main = "worker.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Import HTML pages as text modules
[[rules]]
type = "Text"
globs = ["pages/*.html", "shared/*.html"]
fallthrough = true

routes = [
  { pattern = "pragmaticdharma.org/*", zone_name = "pragmaticdharma.org" },
  { pattern = "retreats.pragmaticdharma.org/*", zone_name = "pragmaticdharma.org" }
]

# M4: daily access_logs PII retention sweep (deletes rows > 90 days old).
# 04:00 UTC = quietest hour for the platform.
[triggers]
crons = ["0 4 * * *"]

# Per-service JWT keys (Task #2). The platform Worker holds ALL signing
# keys: each sub-service has its own key in the Secrets Store, the platform
# picks the right one to sign each JWT based on the destination subdomain
# (kid header). Sub-services hold ONLY their own key.
#
# RESEND_API_KEY and DISCORD_WEBHOOK_URL remain plain Worker secrets
# (set via `wrangler secret put <NAME>`) until rotation; they'll move to
# Secrets Store when next rotated. The getSecret helper handles both.
[[secrets_store_secrets]]
binding     = "JWT_SECRET_PRAGMATICDHARMA"
store_id    = "626a023faf5e4be98729d2f4b9849f09"
secret_name = "JWT_SECRET_PRAGMATICDHARMA"

[[secrets_store_secrets]]
binding     = "JWT_SECRET_EGO_ASSESSMENT"
