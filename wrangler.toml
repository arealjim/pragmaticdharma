name = "pragmaticdharma"
main = "worker.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Import HTML pages as text modules
[[rules]]
type = "Text"
globs = ["pages/*.html", "shared/*.html"]
fallthrough = true

routes = [
  { pattern = "pragmaticdharma.org/*", zone_name = "pragmaticdharma.org" },
  { pattern = "retreats.pragmaticdharma.org/*", zone_name = "pragmaticdharma.org" }
]

# JWT_SECRET is bound from the shared "pragmaticdharma" Secrets Store.
# RESEND_API_KEY and DISCORD_WEBHOOK_URL remain plain Worker secrets
# (set via `wrangler secret put <NAME>`) until rotation; they'll move to
# Secrets Store when next rotated. The getSecret helper in worker.js
# transparently handles both binding types.
[[secrets_store_secrets]]
binding     = "JWT_SECRET"
store_id    = "626a023faf5e4be98729d2f4b9849f09"
secret_name = "JWT_SECRET"

# D1 database — fill ID after running: wrangler d1 create pragmaticdharma
[[d1_databases]]
binding = "DB"
database_name = "pragmaticdharma"
database_id = "d5bfd74e-5105-4136-a876-7d42e588d3d5"
